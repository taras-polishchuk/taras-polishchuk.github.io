<style>
/* ============================
   DESIGN TOKENS
   ============================ */
:root {
  --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
  --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
  --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);
  --text-3xl:  clamp(2.5rem,   1rem    + 4vw,    5rem);
  --text-hero: clamp(3rem,     0.5rem  + 7vw,    8rem);

  --space-1:  0.25rem;
  --space-2:  0.5rem;
  --space-3:  0.75rem;
  --space-4:  1rem;
  --space-5:  1.25rem;
  --space-6:  1.5rem;
  --space-8:  2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-20: 5rem;
  --space-24: 6rem;

  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-2xl: 1.5rem;
  --radius-full: 9999px;

  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in: cubic-bezier(0.4, 0, 1, 1);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

[data-theme="dark"] {
  --color-bg:             #0a0a0b;
  --color-surface:        #111113;
  --color-surface-2:      #16161a;
  --color-surface-offset: #1c1c21;
  --color-surface-dynamic: #242429;
  --color-border:         rgba(255,255,255,0.07);
  --color-divider:        rgba(255,255,255,0.04);
  --color-text:           #e8e8f0;
  --color-text-muted:     rgba(232,232,240,0.5);
  --color-text-faint:     rgba(232,232,240,0.25);
  --color-primary:        #7c6fff;
  --color-primary-glow:   rgba(124,111,255,0.25);
  --color-accent:         #4eecc8;
  --color-accent-glow:    rgba(78,236,200,0.2);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.5);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
  --shadow-glow: 0 0 60px rgba(124,111,255,0.15);

  --font-display: 'Cabinet Grotesk', 'Inter', sans-serif;
  --font-body: 'Inter', sans-serif;
}

/* ============================
   BASE
   ============================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; scroll-behavior: smooth; }
body {
  min-height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background-color: var(--color-bg);
  overflow-x: hidden;
  cursor: none;
}
img, svg { display: block; max-width: 100%; }
button { cursor: none; background: none; border: none; font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; cursor: none; }
::selection { background: rgba(124,111,255,0.3); color: var(--color-text); }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }

/* ============================
   CUSTOM CURSOR
   ============================ */
.cursor-dot {
  position: fixed;
  top: 0; left: 0;
  width: 8px; height: 8px;
  background: #fff;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s var(--ease-out), height 0.2s var(--ease-out), opacity 0.2s;
  mix-blend-mode: difference;
}
.cursor-ring {
  position: fixed;
  top: 0; left: 0;
  width: 36px; height: 36px;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: width 0.35s var(--ease-out), height 0.35s var(--ease-out), border-color 0.2s, opacity 0.2s;
}
.cursor-ring.hover {
  width: 56px; height: 56px;
  border-color: var(--color-primary);
}
.cursor-glow {
  position: fixed;
  top: 0; left: 0;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(124,111,255,0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  transform: translate(-50%, -50%);
  transition: opacity 0.3s;
}

/* ============================
   CANVAS BACKGROUND
   ============================ */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

/* ============================
   INTRO LOADER
   ============================ */
#loader {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--color-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s var(--ease-in), visibility 0.8s;
}
#loader.hidden { opacity: 0; visibility: hidden; }
.loader-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-4);
}
.loader-logo {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--color-text);
  opacity: 0;
  transform: translateY(10px);
  animation: loaderFadeIn 0.6s 0.2s var(--ease-out) forwards;
}
.loader-bar-track {
  width: 120px;
  height: 1px;
  background: var(--color-border);
  overflow: hidden;
  opacity: 0;
  animation: loaderFadeIn 0.4s 0.4s var(--ease-out) forwards;
}
.loader-bar {
  height: 100%;
  background: var(--color-primary);
  transform: translateX(-100%);
  animation: loaderBar 1.2s 0.5s var(--ease-out) forwards;
}
@keyframes loaderFadeIn {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes loaderBar {
  to { transform: translateX(0); }
}

/* ============================
   MAIN LAYOUT
   ============================ */
#main {
  position: relative;
  z-index: 2;
  min-height: 100dvh;
}

/* ============================
   HERO / CARD SCENE
   ============================ */
#hero {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: var(--space-8);
  position: relative;
}

.hero-card {
  position: relative;
  width: 100%;
  max-width: 400px;
  padding: var(--space-10) var(--space-8);
  background: linear-gradient(135deg, rgba(22,22,26,0.9) 0%, rgba(16,16,20,0.95) 100%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-2xl);
  backdrop-filter: blur(20px);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 8px 32px rgba(0,0,0,0.6),
    0 0 80px rgba(124,111,255,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: var(--space-6);
  transform-style: preserve-3d;
  transition: box-shadow 0.4s var(--ease-out);
  will-change: transform;

  opacity: 0;
  transform: translateY(30px) scale(0.96);
  animation: cardEntrance 0.9s 1.6s var(--ease-out) forwards;
}
@keyframes cardEntrance {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Floating animation */
@keyframes cardFloat {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  33% { transform: translateY(-8px) rotate(0.3deg); }
  66% { transform: translateY(-4px) rotate(-0.2deg); }
}
.hero-card.idle {
  animation: cardEntrance 0.9s 1.6s var(--ease-out) forwards,
             cardFloat 7s 2.6s ease-in-out infinite;
}

/* Glassmorphism inner highlight */
.hero-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
  pointer-events: none;
}

/* Glowing accent line at top */
.hero-card::after {
  content: '';
  position: absolute;
  top: -1px;
  left: 20%;
  right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
  border-radius: var(--radius-full);
}

/* Avatar */
.avatar-wrapper {
  position: relative;
  width: 88px; height: 88px;
}
.avatar-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, var(--color-primary), var(--color-accent), var(--color-primary));
  animation: rotateSlow 6s linear infinite;
  opacity: 0.6;
}
@keyframes rotateSlow { to { transform: rotate(360deg); } }
.avatar-inner {
  position: relative;
  width: 88px; height: 88px;
  border-radius: 50%;
  overflow: hidden;
  background: var(--color-surface-offset);
  border: 2px solid var(--color-bg);
  display: flex;
  align-items: center;
  justify-content: center;
}
.avatar-img {
  width: 88px; height: 88px;
  border-radius: 50%;
  object-fit: cover;
  object-position: top center;
  display: block;
}
.avatar-placeholder {
  width: 88px; height: 88px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c6fff 0%, #4eecc8 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.02em;
}

/* Name & title */
.card-name {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.1;
  color: var(--color-text);
}
.card-title {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  font-weight: 400;
  color: var(--color-text-muted);
  letter-spacing: 0.02em;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
  box-shadow: 0 0 8px var(--color-accent);
  animation: pulse 2.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* Tags */
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  justify-content: center;
}
.tag {
  font-size: var(--text-xs);
  font-weight: 500;
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
  background: rgba(124,111,255,0.1);
  border: 1px solid rgba(124,111,255,0.2);
  color: var(--color-primary);
  letter-spacing: 0.02em;
  transition: background var(--transition-interactive), border-color var(--transition-interactive);
}
.tag:hover { background: rgba(124,111,255,0.2); border-color: rgba(124,111,255,0.35); }

/* Divider */
.card-divider {
  width: 100%;
  height: 1px;
  background: var(--color-border);
}

/* Email */
.card-email {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  transition: color var(--transition-interactive);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}
.card-email:hover { color: var(--color-text); }
.card-email svg { opacity: 0.5; transition: opacity var(--transition-interactive); }
.card-email:hover svg { opacity: 1; }

/* Socials */
.card-socials {
  display: flex;
  gap: var(--space-4);
  align-items: center;
}
.social-icon {
  width: 40px; height: 40px;
  border-radius: var(--radius-lg);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-muted);
  transition:
    color var(--transition-interactive),
    background var(--transition-interactive),
    border-color var(--transition-interactive),
    transform var(--transition-interactive),
    box-shadow var(--transition-interactive);
}
.social-icon:hover {
  color: var(--color-text);
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.14);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.social-icon:active { transform: translateY(0); }

/* Explore button */
.explore-btn {
  margin-top: var(--space-2);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-text-faint);
  padding: var(--space-3) var(--space-5);
  border-radius: var(--radius-full);
  border: 1px solid rgba(255,255,255,0.06);
  transition:
    color var(--transition-interactive),
    border-color var(--transition-interactive),
    background var(--transition-interactive),
    box-shadow var(--transition-interactive);
  position: relative;
  overflow: hidden;
}
.explore-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(124,111,255,0) 0%, rgba(124,111,255,0.06) 100%);
  opacity: 0;
  transition: opacity var(--transition-interactive);
}
.explore-btn:hover {
  color: var(--color-text);
  border-color: rgba(124,111,255,0.3);
  box-shadow: 0 0 20px rgba(124,111,255,0.1);
}
.explore-btn:hover::before { opacity: 1; }
.explore-btn .btn-arrow {
  display: inline-block;
  transition: transform var(--transition-interactive);
}
.explore-btn:hover .btn-arrow { transform: rotate(90deg); }

/* ============================
   PROJECTS OVERLAY
   ============================ */
#projects-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(8,8,10,0.0);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s var(--ease-out), background 0.5s var(--ease-out);
}
#projects-overlay.active {
  opacity: 1;
  pointer-events: all;
  background: rgba(8,8,10,0.96);
}

/* Close button */
.projects-close {
  position: fixed;
  top: var(--space-8);
  right: var(--space-8);
  z-index: 52;
  width: 44px; height: 44px;
  border-radius: var(--radius-full);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-muted);
  opacity: 0;
  transform: rotate(-90deg) scale(0.8);
  transition:
    color var(--transition-interactive),
    background var(--transition-interactive),
    opacity 0.4s 0.2s var(--ease-out),
    transform 0.4s 0.2s var(--ease-out);
}
#projects-overlay.active .projects-close {
  opacity: 1;
  transform: rotate(0deg) scale(1);
}
.projects-close:hover { color: var(--color-text); background: rgba(255,255,255,0.1); }

/* Projects header */
.projects-header {
  position: absolute;
  top: var(--space-8);
  left: var(--space-8);
  right: 80px;
  opacity: 0;
  transform: translateY(-16px);
  transition: opacity 0.5s 0.15s var(--ease-out), transform 0.5s 0.15s var(--ease-out);
}
#projects-overlay.active .projects-header { opacity: 1; transform: translateY(0); }
.projects-eyebrow {
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-primary);
  margin-bottom: var(--space-1);
}
.projects-title {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.05;
  color: var(--color-text);
}

/* Projects scroll area */
.projects-scroll-area {
  position: absolute;
  inset: 0;
  top: 120px;
  padding: 0 var(--space-8) var(--space-16);
  overflow-x: hidden;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(124,111,255,0.3) transparent;
}

/* Projects grid */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(340px,100%), 1fr));
  gap: var(--space-5);
  padding-top: var(--space-4);
  max-width: 1200px;
  margin: 0 auto;
}

/* Project card */
.project-card {
  position: relative;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-2xl);
  overflow: hidden;
  transition:
    transform 0.4s var(--ease-out),
    box-shadow 0.4s var(--ease-out),
    border-color 0.4s var(--ease-out);
  opacity: 0;
  transform: translateY(30px);
  will-change: transform;
}
.project-card.revealed {
  transition:
    opacity 0.6s var(--ease-out),
    transform 0.6s var(--ease-out),
    box-shadow 0.4s var(--ease-out),
    border-color 0.4s var(--ease-out);
  opacity: 1;
  transform: translateY(0);
}
.project-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(124,111,255,0.08);
  border-color: rgba(124,111,255,0.2);
}

.project-preview {
  position: relative;
  aspect-ratio: 16/9;
  overflow: hidden;
  background: var(--color-surface-offset);
}
.project-preview-img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.6s var(--ease-out), filter 0.4s;
  filter: brightness(0.7) saturate(0.8);
}
.project-card:hover .project-preview-img {
  transform: scale(1.04);
  filter: brightness(0.85) saturate(1);
}
.project-preview-gradient {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(to top, var(--color-surface) 0%, transparent 100%);
  pointer-events: none;
}

/* Project preview placeholder (gradient bg) */
.project-preview-placeholder {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  filter: saturate(0.7) brightness(0.6);
}

.project-body {
  padding: var(--space-5) var(--space-5) var(--space-6);
}
.project-number {
  font-size: var(--text-xs);
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--color-text-faint);
  margin-bottom: var(--space-2);
}
.project-name {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--color-text);
  margin-bottom: var(--space-2);
  line-height: 1.2;
}
.project-desc {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  line-height: 1.6;
  margin-bottom: var(--space-4);
  display: -webkit-box;
  line-clamp: 2;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.project-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
  flex-wrap: wrap;
}
.project-tags {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-1);
}
.project-tag {
  font-size: 11px;
  font-weight: 500;
  padding: 2px var(--space-2);
  border-radius: var(--radius-full);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--color-text-faint);
  letter-spacing: 0.02em;
}
.project-link {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-primary);
  letter-spacing: 0.02em;
  flex-shrink: 0;
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  border: 1px solid rgba(124,111,255,0.2);
  transition:
    background var(--transition-interactive),
    border-color var(--transition-interactive),
    color var(--transition-interactive);
}
.project-link:hover {
  background: rgba(124,111,255,0.12);
  border-color: rgba(124,111,255,0.4);
}

/* ============================
   KEYBOARD NAV HINT
   ============================ */
.kbd-hint {
  position: fixed;
  bottom: var(--space-8);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  opacity: 0;
  transition: opacity 0.4s 0.4s var(--ease-out);
  pointer-events: none;
  white-space: nowrap;
}
#projects-overlay.active .kbd-hint { opacity: 1; pointer-events: all; }
.kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px; height: 22px;
  padding: 0 var(--space-2);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-sm);
  font-size: 10px;
  font-weight: 600;
  background: rgba(255,255,255,0.04);
  color: var(--color-text-muted);
}

/* ============================
   SCROLL INDICATOR
   ============================ */
.scroll-hint {
  position: fixed;
  bottom: var(--space-8);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-2);
  opacity: 0;
  animation: hintFadeIn 0.6s 3s var(--ease-out) forwards;
  transition: opacity 0.4s;
  z-index: 3;
}
.scroll-hint.hidden { opacity: 0 !important; animation: none; }
@keyframes hintFadeIn { to { opacity: 1; } }
.scroll-hint-text {
  font-size: var(--text-xs);
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-text-faint);
}
.scroll-hint-mouse {
  width: 20px; height: 32px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 5px;
}
.scroll-hint-dot {
  width: 3px; height: 6px;
  background: rgba(255,255,255,0.4);
  border-radius: 2px;
  animation: scrollDot 2s ease-in-out infinite;
}
@keyframes scrollDot {
  0%, 100% { transform: translateY(0); opacity: 1; }
  60% { transform: translateY(8px); opacity: 0.3; }
}

/* ============================
   RESPONSIVE
   ============================ */
@media (max-width: 600px) {

  .scroll-hint { bottom: var(--space-5); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

    emoji: "🧩",
    link: "https://taras-polishchuk.github.io/ui-lab/"
  }
];

/* ==============================================================
   CANVAS PARTICLE BACKGROUND
   ============================================================== */
(function initCanvas() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], mouse = { x: -999, y: -999 };
  const PARTICLE_COUNT = 80;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function createParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      opacity: Math.random() * 0.4 + 0.05,
      opDir: Math.random() > 0.5 ? 1 : -1,
      opSpeed: Math.random() * 0.003 + 0.001
    };
  }

  resize();
  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(createParticle());
  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Subtle radial glow at mouse position
    if (mouse.x > 0) {
      const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 350);
      g.addColorStop(0, 'rgba(124,111,255,0.04)');
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    // Draw connections and particles
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;

      // Wrap around
      if (p.x < -5) p.x = W + 5;
      if (p.x > W + 5) p.x = -5;
      if (p.y < -5) p.y = H + 5;
      if (p.y > H + 5) p.y = -5;

      // Breathe opacity
      p.opacity += p.opDir * p.opSpeed;
      if (p.opacity > 0.45 || p.opacity < 0.05) p.opDir *= -1;

      // Mouse influence
      const dx = mouse.x - p.x, dy = mouse.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 180) {
        const force = (1 - dist / 180) * 0.4;
        p.vx += (dx / dist) * force * 0.02;
        p.vy += (dy / dist) * force * 0.02;
      }

      // Dampen velocity
      p.vx *= 0.99;
      p.vy *= 0.99;

      // Draw connections
      for (let j = i + 1; j < particles.length; j++) {
        const q = particles[j];
        const cx = p.x - q.x, cy = p.y - q.y;
        const cdist = Math.sqrt(cx * cx + cy * cy);
        if (cdist < 120) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = `rgba(124,111,255,${(1 - cdist / 120) * 0.12})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }

      // Draw particle
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,196,255,${p.opacity})`;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }
  draw();
})();

/* ==============================================================
   CURSOR
   ============================================================== */
(function initCursor() {
  const dot = document.getElementById('cursorDot');
  const ring = document.getElementById('cursorRing');
  const glow = document.getElementById('cursorGlow');
  let mx = 0, my = 0, rx = 0, ry = 0, gx = 0, gy = 0;

  window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  function animate() {
    // Dot follows instantly
    dot.style.left = mx + 'px';
    dot.style.top = my + 'px';

    // Ring lerps
    rx += (mx - rx) * 0.18;
    ry += (my - ry) * 0.18;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';

    // Glow lazy
    gx += (mx - gx) * 0.06;
    gy += (my - gy) * 0.06;
    glow.style.left = gx + 'px';
    glow.style.top = gy + 'px';

    requestAnimationFrame(animate);
  }
  animate();

  // Hover states
  document.querySelectorAll('a, button, [role="button"], .social-icon, .project-card').forEach(el => {
    el.addEventListener('mouseenter', () => ring.classList.add('hover'));
    el.addEventListener('mouseleave', () => ring.classList.remove('hover'));
  });
})();

/* ==============================================================
   LOADER
   ============================================================== */
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
    const card = document.getElementById('heroCard');
    card.classList.add('idle');
  }, 1800);
});

/* ==============================================================
   CARD 3D TILT
   ============================================================== */
(function initTilt() {
  const card = document.getElementById('heroCard');
  let tiltActive = false;

  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const rotX = ((e.clientY - cy) / (rect.height / 2)) * -10;
    const rotY = ((e.clientX - cx) / (rect.width / 2)) * 10;

    card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.02)`;
    card.style.transition = 'transform 0.1s linear';
    tiltActive = true;
  });

  card.addEventListener('mouseleave', () => {
    card.style.transform = '';
    card.style.transition = 'transform 0.6s cubic-bezier(0.16,1,0.3,1)';
    tiltActive = false;
  });
})();

/* ==============================================================
   PROJECTS — BUILD CARDS
   ============================================================== */
function buildProjectCards() {
  const grid = document.getElementById('projectsGrid');
  grid.innerHTML = '';

  PROJECTS.forEach((p, i) => {
    const card = document.createElement('article');
    card.className = 'project-card';
    card.style.transitionDelay = `${i * 0.07 + 0.1}s`;

    card.innerHTML = `
      <div class="project-preview">
        <div class="project-preview-placeholder" style="background:${p.gradient}">
          <span style="font-size:3rem">${p.emoji}</span>
        </div>
        <div class="project-preview-gradient"></div>
      </div>
      <div class="project-body">
        <p class="project-number">0${p.id}</p>
        <h3 class="project-name">${p.name}</h3>
        <p class="project-desc">${p.desc}</p>
        <div class="project-footer">
          <div class="project-tags">
            ${p.tags.map(t => `<span class="project-tag">${t}</span>`).join('')}
          </div>
          <a href="${p.link}" class="project-link" target="_blank" rel="noopener noreferrer">
            View
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M7 17 17 7M7 7h10v10"/></svg>
          </a>
        </div>
      </div>
    `;

    grid.appendChild(card);

    // Add cursor hover effect
    card.addEventListener('mouseenter', () => {
      document.getElementById('cursorRing').classList.add('hover');
    });
    card.addEventListener('mouseleave', () => {
      document.getElementById('cursorRing').classList.remove('hover');
    });
  });
}

/* ==============================================================
   OPEN/CLOSE PROJECTS
   ============================================================== */
const overlay = document.getElementById('projects-overlay');
const exploreBtn = document.getElementById('exploreBtn');
const closeBtn = document.getElementById('projectsClose');
const scrollHint = document.getElementById('scrollHint');

function openProjects() {
  if (!overlay.dataset.built) {
    buildProjectCards();
    overlay.dataset.built = 'true';
  }
  overlay.classList.add('active');
  exploreBtn.setAttribute('aria-expanded', 'true');
  scrollHint.classList.add('hidden');
  document.body.style.overflow = 'hidden';

  // Reveal cards with stagger
  setTimeout(() => {
    document.querySelectorAll('.project-card').forEach((card, i) => {
      setTimeout(() => card.classList.add('revealed'), i * 70 + 100);
    });
  }, 200);

  // Focus trap
  setTimeout(() => closeBtn.focus(), 300);
}

function closeProjects() {
  overlay.classList.remove('active');
  exploreBtn.setAttribute('aria-expanded', 'false');
  document.body.style.overflow = '';

  // Reset card states
  document.querySelectorAll('.project-card').forEach(c => {
    c.classList.remove('revealed');
    c.style.transitionDelay = '';
  });

  exploreBtn.focus();
}

exploreBtn.addEventListener('click', openProjects);
closeBtn.addEventListener('click', closeProjects);

// Click card to open
document.getElementById('heroCard').addEventListener('click', (e) => {
  if (!e.target.closest('a') && !e.target.closest('.explore-btn')) {
    openProjects();
  }
});

// Keyboard: Enter/Space on card
document.getElementById('heroCard').addEventListener('keydown', (e) => {
  if ((e.key === 'Enter' || e.key === ' ') && !e.target.closest('a') && !e.target.closest('.explore-btn')) {
    e.preventDefault();
    openProjects();
  }
});

// Keyboard: Esc to close, arrows for project focus
document.addEventListener('keydown', e => {
  if (!overlay.classList.contains('active')) return;

  if (e.key === 'Escape') { closeProjects(); return; }

  const cards = [...document.querySelectorAll('.project-card')];
  const focused = document.activeElement;
  const idx = cards.indexOf(focused);

  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    const next = cards[idx + 1] || cards[0];
    next.focus();
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = cards[idx - 1] || cards[cards.length - 1];
    prev.focus();
  }
});

// Make project cards keyboard focusable
document.addEventListener('DOMContentLoaded', () => {});
document.getElementById('projectsGrid').addEventListener('DOMNodeInserted', () => {
  document.querySelectorAll('.project-card').forEach(c => {
    c.setAttribute('tabindex', '0');
  });
});

/* ==============================================================
   SCROLL TO TRIGGER
   ============================================================== */
let hasScrolled = false;
window.addEventListener('wheel', e => {
  if (!hasScrolled && !overlay.classList.contains('active')) {
    hasScrolled = true;
    openProjects();
  }
}, { passive: true });

window.addEventListener('touchstart', e => {
  if (!overlay.classList.contains('active')) {
    const touch = e.touches[0];
    window._touchY = touch.clientY;
  }
}, { passive: true });

window.addEventListener('touchmove', e => {
  if (!hasScrolled && !overlay.classList.contains('active') && window._touchY !== undefined) {
    const dy = window._touchY - e.touches[0].clientY;
    if (dy > 30) {
      hasScrolled = true;
      openProjects();
    }
  }
}, { passive: true });

/* ==============================================================
   MOBILE: remove custom cursor
   ============================================================== */
if (window.matchMedia('(hover: none)').matches) {
  document.getElementById('cursorDot').style.display = 'none';
  document.getElementById('cursorRing').style.display = 'none';
  document.getElementById('cursorGlow').style.display = 'none';
  document.body.style.cursor = 'auto';
  document.querySelectorAll('*').forEach(el => el.style.cursor = '');
}
</script>
</body>
</html>
